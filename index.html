<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SignConnect</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}


.bg-video{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-2;
}


.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
z-index:-1;
}


.content{
text-align:center;
color:white;
z-index:1;
}

.content h1{
font-size:50px;
margin-bottom:15px;
}

.content p{
font-size:20px;
margin-bottom:25px;
}

button{
padding:12px 25px;
font-size:16px;
border:none;
border-radius:8px;
cursor:pointer;
background:#4facfe;
color:white;
transition:0.3s;
}

button:hover{
background:#00c6ff;
}
</style>
</head>

<body>


<video class="bg-video" autoplay muted loop >
<source src="backgroundloginvideo.mp4" type="video/mp4">
</video>

<div class="overlay"></div>


<div class="content">
<h1>Welcome to SignConnect</h1>
<p>Let Hands Do the Talking.</p>
<button onclick="goLogin()">Get Started</button>
</div>

<script>
function goLogin(){
window.location.href="login.html";
}
</script>

</body>
</html>
