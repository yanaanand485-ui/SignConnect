<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<style>

    *{
        box-sizing: border-box;
    }

body{
margin:0;
font-family:Arial;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}


#bgVideo{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-2;
}


.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
z-index:-1;
}


.login-box{
background:black;
padding:40px;
border-radius:12px;
width:340px;
box-shadow:0 0 40px rgba(0,0,0,0.9);
color:white;
text-align:center;
}


input[type="radio"]{
display:none;
}

.form{
display:none;
}

#login:checked ~ .forms #loginForm{
display:block;
}

#register:checked ~ .forms #registerForm{
display:block;
}

input[type="text"],
input[type="email"],
input[type="password"]{

width:100%;
padding:12px;
margin:10px 0;
border-radius:6px;
border:none;
background:#222;
color:white;

}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:6px;
background:white;
color:black;
font-weight:bold;
cursor:pointer;
}

.toggle{
margin-top:15px;
cursor:pointer;
color:#bbb;
font-size:14px;
}

.toggle:hover{
color:white;
}

.guest{
margin-top:10px;
color:gray;
font-size:14px;
}

.guest a{
color:gray;
text-decoration:none;
}

.guest a:hover{
color:white;
}

.password-box{
    position:relative;
    margin:10px 0;
}

.password-box input{
    width:100%;
    padding:12px 40px 12px 12px;
    
}

.eye{
    position:absolute;
    right:10px;
    top:50%;
    transform:translateY(-50%);
    cursor:pointer;
    font-size: 18px;
}

</style>
</head>

<body>

 <video autoplay muted loop id="bgVideo">
<source src="login2p.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<div class="login-box">

<input type="radio" name="tab" id="login" checked>
<input type="radio" name="tab" id="register">

<div class="forms">


<div class="form" id="loginForm">

<h2>Sign In</h2>

<form  id="loginFormSubmit">

<input type="email" id="loginEmail" placeholder="Email" required>

<div class="password-box">
    <input type="password" id="loginPassword" placeholder="Password" required>
    <span onclick="toggleLoginPass()" id="loginEye" class="eye">&#128065;</span>
</div>
<button type="submit">Login</button>

</form>

<p id="loginMsg"></p>
<p class="toggle" id="forgot">Forgot Password?</p>

<label class="toggle" for="register">
Don't have an account? Sign Up
</label>

<div class="guest">
<a href="home.html">Continue as Guest</a>
</div>

</div>


<div class="form" id="registerForm">

<h2>Create Account</h2>

<form  id="registerFormSubmit">

<input type="text" id="name"  placeholder="Full Name" required>
<input type="email" id="registerEmail" placeholder="Email" required>

<div class="password-box">
    <input type="password" id="registerPassword" placeholder="Password" required>
    <span onclick="toggleRegisterPass()" id="registerEye" class="eye">&#128065;</span>
</div>
<button type="submit">Register</button>

</form>

<p id="registerMsg"></p>

<label class="toggle" for="login">
Already have an account? Sign In
</label>

<div class="guest">
<a href="home.html">Continue as Guest</a>
</div>

</div>

</div>

</div>

<script>

    


document.addEventListener("DOMContentLoaded", function(){
 


    let current = localStorage.getItem("currentUser");

if(current){
     window.location.href = "home.html";
}


    console.log("JS LOADED"); 

  
  document.getElementById("registerFormSubmit").addEventListener("submit", function(e){
    e.preventDefault();

    let name = document.getElementById("name").value;
    let email = document.getElementById("registerEmail").value;
    let password = document.getElementById("registerPassword").value;

    if(password.length < 4){
    document.getElementById("registerMsg").innerText = "Password too short";
    return;
}

    let users = localStorage.getItem("users");

    if(users == null){
        users = [];
    } else {
        users = JSON.parse(users);
    }

  
    for(let i=0; i<users.length; i++){
        if(users[i].email === email){
            document.getElementById("registerMsg").innerText = "User already exists";
            return;
        }
    }

   
    let user = {
        name: name,
        email: email,
        password: password
    };

    users.push(user);

    localStorage.setItem("users", JSON.stringify(users));

    document.getElementById("registerMsg").innerText = "Registered!";
});
  



    document.getElementById("loginFormSubmit").addEventListener("submit", function(e){
    e.preventDefault();

    let email = document.getElementById("loginEmail").value;
    let password = document.getElementById("loginPassword").value;

    let users = JSON.parse(localStorage.getItem("users"));

    if(users == null){
        document.getElementById("loginMsg").innerText = "No users found";
        return;
    }

    let found = false;

    for(let i=0; i<users.length; i++){
        if(users[i].email === email && users[i].password === password){
            found = true;
            break;
        }
    }

    if(found){
       
    document.getElementById("loginMsg").innerText = "Login Success";
    localStorage.setItem("currentUser", email);

    setTimeout(function(){
        window.location.href = "home.html";
    }, 1000);


    } else {
        document.getElementById("loginMsg").innerText = "Invalid Email or Password";
    }
});

  
let forgotBtn = document.getElementById("forgot");

if(forgotBtn){
    forgotBtn.addEventListener("click", function(){

        let users = JSON.parse(localStorage.getItem("users"));

        if(!users){
            alert("No user found");
            return;
        }

        let email = prompt("Enter your email:");

        let found = false;

        for(let i=0; i<users.length; i++){
            if(users[i].email === email){

                let newPass = prompt("Enter new password:");
                users[i].password = newPass;

                localStorage.setItem("users", JSON.stringify(users));

                alert("Password updated");
                found = true;
                break;
            }
        }

        if(!found){
            alert("Email not found");
        }

    });
}






});  


function toggleRegisterPass(){
    let p = document.getElementById("registerPassword");
    let eye = document.getElementById("registerEye");

    if(p.type === "password"){
        p.type = "text";
        eye.innerText = '\u{1F648}'; 
    } else {
        p.type = "password";
        eye.innerText = '\u{1F441}';
    }
}





function toggleLoginPass(){
    let p = document.getElementById("loginPassword");
    let eye = document.getElementById("loginEye");

    if(p.type === "password"){
        p.type = "text";
        eye.innerText = '\u{1F648}'; 
    } else {
        p.type = "password";
        eye.innerText = '\u{1F441}';
    }
}


function logout(){
    localStorage.removeItem("currentUser");
    alert("Logged out");
    location.reload();
}


</script>
</body>
</html>
